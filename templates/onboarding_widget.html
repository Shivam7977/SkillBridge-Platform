<!-- ONBOARDING WIDGET — include on mainpage.html only -->

<style>
/* ── Onboarding Widget — SkillBridge design system ── */
.onb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.55);
    z-index: 99990;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    padding: clamp(.75rem, 4vw, 1.5rem);
}
.onb-overlay.open { display: flex; }

.onb-modal {
    background: #fff;
    border-radius: 24px;
    padding: clamp(1.5rem, 5vw, 2.5rem);
    width: 100%;
    max-width: 520px;
    border: 1.5px solid #e5d9c0;
    box-shadow: 0 40px 80px rgba(26,23,20,0.18);
    animation: onbIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
}
@keyframes onbIn {
    from { transform: scale(0.9) translateY(16px); opacity: 0; }
    to   { transform: none; opacity: 1; }
}

/* Close button */
.onb-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 8px; border: 1.5px solid #e5d9c0;
    background: #f8f4ec; color: #7a7268;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .85rem; transition: .18s;
    font-family: inherit;
}
.onb-close:hover { background: #1a1714; color: #f8f4ec; border-color: #1a1714; }

/* HEADER */
.onb-header { text-align: center; margin-bottom: 1.75rem; padding-right: 1.5rem; }
.onb-wave { font-size: 2.5rem; display: block; margin-bottom: 10px; }
.onb-header h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.25rem, 3vw, 1.5rem);
    font-weight: 900; color: #1a1714; margin-bottom: 5px;
}
.onb-header p { font-size: .85rem; color: #7a7268; line-height: 1.55; }

/* PROGRESS BAR */
.onb-progress-wrap { margin-bottom: 1.5rem; }
.onb-progress-top { display: flex; justify-content: space-between; font-size: .73rem; font-weight: 700; color: #7a7268; margin-bottom: 6px; }
.onb-progress-bar { height: 7px; background: #e5d9c0; border-radius: 4px; overflow: hidden; }
.onb-progress-fill { height: 100%; background: linear-gradient(90deg, #1a1714, #c4973a); border-radius: 4px; transition: width 0.6s ease; }

/* STEPS */
.onb-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.onb-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1.5px solid #e5d9c0;
    background: #fdfcf8;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
}
.onb-step:hover { border-color: #1a1714; background: #f8f4ec; transform: translateX(3px); }
.onb-step.done { border-color: #10b981; background: rgba(16,185,129,0.04); }
.onb-step.done:hover { border-color: #059669; background: rgba(16,185,129,0.08); transform: translateX(3px); }

.onb-step-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem; flex-shrink: 0;
    background: #f0e9d8; color: #7a7268;
}
.onb-step.done .onb-step-icon { background: rgba(16,185,129,0.1); color: #10b981; }

.onb-step-body { flex: 1; min-width: 0; }
.onb-step-title { font-size: .86rem; font-weight: 800; color: #1a1714; }
.onb-step-desc { font-size: .73rem; color: #7a7268; margin-top: 2px; line-height: 1.4; }
.onb-step.done .onb-step-title { color: #059669; }

.onb-step-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.onb-xp-badge {
    font-size: .67rem; font-weight: 800;
    background: rgba(196,151,58,.12); color: #c4973a;
    padding: 2px 8px; border-radius: 20px;
    border: 1px solid rgba(196,151,58,.2);
}
.onb-step.done .onb-xp-badge { background: rgba(16,185,129,0.1); color: #10b981; border-color: rgba(16,185,129,0.2); }
.onb-check { font-size: .95rem; color: #10b981; display: none; }
.onb-step.done .onb-check { display: block; }
.onb-arrow { font-size: .72rem; color: #9c9488; }
.onb-step.done .onb-arrow { display: none; }

/* FOOTER */
.onb-footer { display: flex; gap: 10px; }
.onb-skip {
    flex: 1; padding: 11px;
    border-radius: 11px; border: 1.5px solid #e5d9c0;
    background: #fff; color: #7a7268;
    font-weight: 700; font-size: .85rem;
    cursor: pointer; font-family: inherit; transition: .2s;
}
.onb-skip:hover { background: #f8f4ec; border-color: #1a1714; color: #1a1714; }
.onb-cta {
    flex: 2; padding: 11px;
    border-radius: 11px; border: none;
    background: #1a1714; color: #f8f4ec;
    font-weight: 800; font-size: .85rem;
    cursor: pointer; font-family: inherit; transition: .2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
}
.onb-cta:hover { opacity: .88; transform: translateY(-1px); }

/* DARK MODE */
body.dark .onb-modal { background: #2c2820 !important; border-color: #3d3830 !important; }
body.dark .onb-header h2 { color: #f0e9d8 !important; }
body.dark .onb-header p { color: #9c9488 !important; }
body.dark .onb-close { background: #1a1714 !important; border-color: #3d3830 !important; color: #9c9488 !important; }
body.dark .onb-close:hover { background: #f0e9d8 !important; color: #1a1714 !important; }
body.dark .onb-step { border-color: #3d3830 !important; background: #23201c !important; }
body.dark .onb-step:hover { border-color: #f0e9d8 !important; background: #2c2820 !important; }
body.dark .onb-step.done { border-color: #059669 !important; background: rgba(16,185,129,0.06) !important; }
body.dark .onb-step-title { color: #f0e9d8 !important; }
body.dark .onb-step-desc { color: #9c9488 !important; }
body.dark .onb-step-icon { background: #1a1714 !important; color: #9c9488 !important; }
body.dark .onb-progress-bar { background: #3d3830 !important; }
body.dark .onb-progress-top { color: #9c9488 !important; }
body.dark .onb-skip { background: #23201c !important; border-color: #3d3830 !important; color: #9c9488 !important; }
body.dark .onb-skip:hover { background: #2c2820 !important; border-color: #f0e9d8 !important; color: #f0e9d8 !important; }
body.dark .onb-cta { background: #f0e9d8 !important; color: #1a1714 !important; }

/* RESPONSIVE */
@media (max-width: 480px) {
    .onb-modal { border-radius: 18px; padding: 1.5rem 1.25rem; }
    .onb-step { padding: 10px 12px; gap: 10px; }
    .onb-step-icon { width: 34px; height: 34px; font-size: .82rem; }
    .onb-footer { flex-direction: column; }
    .onb-skip, .onb-cta { flex: none; width: 100%; }
}
@media (max-width: 360px) {
    .onb-wave { font-size: 2rem; }
    .onb-header h2 { font-size: 1.1rem; }
    .onb-step-title { font-size: .8rem; }
    .onb-step-desc { font-size: .7rem; }
}
</style>

<div class="onb-overlay" id="onb-overlay">
    <div class="onb-modal">
        <button class="onb-close" onclick="dismissOnboarding()" aria-label="Close"><i class="fas fa-times"></i></button>
        <div class="onb-header">
            <span class="onb-wave">👋</span>
            <h2>Welcome to SkillBridge!</h2>
            <p>Complete these steps to set up your account and start earning XP.</p>
        </div>

        <div class="onb-progress-wrap">
            <div class="onb-progress-top">
                <span id="onb-progress-text">0 of 4 completed</span>
                <span id="onb-progress-pct">0%</span>
            </div>
            <div class="onb-progress-bar">
                <div class="onb-progress-fill" id="onb-progress-fill" style="width:0%"></div>
            </div>
        </div>

        <div class="onb-steps" id="onb-steps">
            <!-- Populated by JS -->
        </div>

        <div class="onb-footer">
            <button class="onb-skip" onclick="dismissOnboarding()">Skip for now</button>
            <button class="onb-cta" id="onb-cta-btn" onclick="goToFirstStep()">
                <i class="fas fa-rocket"></i> Let's Go!
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    const ICONS = {
        'fa-user-circle': 'fa-user-circle',
        'fa-layer-group': 'fa-layer-group',
        'fa-magic': 'fa-magic',
        'fa-users': 'fa-users'
    };

    let firstUndonStep = null;

    async function loadOnboarding() {
        try {
            const res = await fetch('/api/onboarding/status');
            const data = await res.json();
            if (!data.show) return;

            renderSteps(data.steps);
            document.getElementById('onb-overlay').classList.add('open');
        } catch(e) {}
    }

    function renderSteps(steps) {
        const container = document.getElementById('onb-steps');
        const doneCount = steps.filter(s => s.done).length;
        const pct = Math.round((doneCount / steps.length) * 100);

        document.getElementById('onb-progress-text').textContent = `${doneCount} of ${steps.length} completed`;
        document.getElementById('onb-progress-pct').textContent = pct + '%';
        document.getElementById('onb-progress-fill').style.width = pct + '%';

        firstUndonStep = steps.find(s => !s.done);
        if (firstUndonStep) {
            document.getElementById('onb-cta-btn').onclick = () => {
                dismissOnboarding();
                window.location.href = firstUndonStep.link;
            };
        } else {
            document.getElementById('onb-cta-btn').textContent = '✅ All done!';
            document.getElementById('onb-cta-btn').onclick = dismissOnboarding;
        }

        container.innerHTML = steps.map(step => `
            <a class="onb-step ${step.done ? 'done' : ''}"
               href="${step.link}"
               onclick="handleStepClick(event, '${step.link}')">
                <div class="onb-step-icon">
                    <i class="fas ${step.icon}"></i>
                </div>
                <div class="onb-step-body">
                    <div class="onb-step-title">${step.title}</div>
                    <div class="onb-step-desc">${step.desc}</div>
                </div>
                <div class="onb-step-right">
                    <span class="onb-xp-badge">${step.xp}</span>
                    <i class="fas fa-check-circle onb-check"></i>
                    <i class="fas fa-chevron-right onb-arrow"></i>
                </div>
            </a>`).join('');
    }

    window.handleStepClick = function(e, link) {
        e.preventDefault();
        dismissOnboarding();
        window.location.href = link;
    };

    window.dismissOnboarding = async function() {
        document.getElementById('onb-overlay').classList.remove('open');
        try {
            await fetch('/api/onboarding/dismiss', { method: 'POST' });
        } catch(e) {}
    };

    window.goToFirstStep = function() {
        if (firstUndonStep) {
            dismissOnboarding();
            window.location.href = firstUndonStep.link;
        }
    };

    // Close on backdrop click
    document.getElementById('onb-overlay').addEventListener('click', function(e) {
        if (e.target === this) dismissOnboarding();
    });

    // Load after a short delay so page renders first
    setTimeout(loadOnboarding, 800);
})();
</script>
