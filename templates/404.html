<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
  <style>
    :root { --bg:#f8f4ec;--surface:#ffffff;--primary:#1a1714;--secondary:#c4973a;--text-main:#1a1714;--text-dim:#7a7268;--border:#e5d9c0; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .wrapper{text-align:center;max-width:560px;width:100%;}
    .logo{font-size:1.7rem;font-weight:800;margin-bottom:2.5rem;display:block;color:#1a1714;-webkit-text-fill-color:#1a1714;font-family:'Playfair Display',serif;text-decoration:none;}
    .card{background:var(--surface);border-radius:28px;padding:3.5rem 2.5rem;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.07);}
    .error-code{font-size:7rem;font-weight:900;line-height:1;font-family:'Playfair Display',serif;color:var(--primary);margin-bottom:0.5rem;}
    .emoji{font-size:3.5rem;margin-bottom:1.2rem;display:block;}
    h1{font-size:1.7rem;font-weight:800;margin-bottom:0.8rem;}
    p{font-size:0.95rem;color:var(--text-dim);margin-bottom:2.5rem;line-height:1.7;}
    .btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .btn-primary{padding:12px 28px;border-radius:50px;text-decoration:none;background:var(--primary);color:#f8f4ec;font-weight:700;font-size:0.88rem;transition:0.2s;display:inline-flex;align-items:center;gap:8px;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,23,20,0.2);opacity:.9;}
    .btn-secondary{padding:12px 28px;border-radius:50px;text-decoration:none;border:2px solid var(--border);background:transparent;color:var(--text-main);font-weight:700;font-size:0.88rem;transition:0.2s;display:inline-flex;align-items:center;gap:8px;}
    .btn-secondary:hover{border-color:var(--primary);color:var(--primary);background:var(--bg);}
    .suggestions{margin-top:2.5rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .suggestion-link{font-size:0.8rem;font-weight:700;color:var(--text-dim);text-decoration:none;padding:6px 14px;border-radius:20px;background:var(--bg);border:1px solid var(--border);transition:0.2s;}
    .suggestion-link:hover{background:var(--border);color:var(--primary);}
    body.dark{--bg:#1a1714;--surface:#2c2820;--text-main:#f0e9d8;--text-dim:#9c9488;--border:#3d3830;}
    body.dark .suggestion-link{background:#2c2820;}
    body.dark .btn-secondary{color:#f0e9d8;} body.dark .logo{color:#f0e9d8 !important;-webkit-text-fill-color:#f0e9d8 !important;}
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="/" class="logo">SkillBridge</a>
    <div class="card">
      <div class="error-code">404</div>
      <span class="emoji">🔍</span>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Don't worry — your XP is safe!</p>
      <div class="btn-group">
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('main_page') }}" class="btn-primary">🏠 Go to Dashboard</a>
        {% else %}
          <a href="{{ url_for('index') }}" class="btn-primary">🏠 Go Home</a>
        {% endif %}
        <a href="javascript:history.back()" class="btn-secondary">← Go Back</a>
      </div>
      <div class="suggestions">
        <a href="{{ url_for('projects') }}" class="suggestion-link">🌐 Community</a>
        <a href="{{ url_for('roadmap_generator') }}" class="suggestion-link">🗺️ Roadmap AI</a>
        <a href="{{ url_for('leaderboard') }}" class="suggestion-link">🏆 Leaderboard</a>
        <a href="{{ url_for('find_communities') }}" class="suggestion-link">👥 Communities</a>
      </div>
    </div>
  </div>
  <script>(function(){ var t=localStorage.getItem('sb-theme')||'light'; t==='dark'?document.body.classList.add('dark'):document.body.classList.remove('dark'); })();</script>
</body>
</html>
