<!-- SKILLBRIDGE AI ASSISTANT — Floating Chatbot Widget -->
<style>
#sb-root {
  --p:      #1a1714;
  --a:      #c4973a;
  --bg:     #f8f4ec;
  --surf:   #fdfcf8;
  --surf2:  #f0e9d8;
  --border: #e5d9c0;
  --text:   #1a1714;
  --muted:  #7a7268;
  --radius: 18px;
}

/* BUBBLE ICON LAYER ANCHORS */
#sb-bubble {
  position: fixed;
  bottom: 26px; 
  right: 26px;
  z-index: 9999;
  width: 62px; 
  height: 62px;
  border-radius: 50%;
  background: #1a1714;
  border: 2px solid #e5d9c0;
  cursor: pointer;
  display: flex; 
  align-items: center; 
  justify-content: center;
  box-shadow: 0 8px 32px rgba(26,23,20,0.2), 0 2px 8px rgba(0,0,0,0.1);
  transition: transform .25s cubic-bezier(.16,1,0.3,1), box-shadow .25s;
}
#sb-bubble:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 14px 44px rgba(26,23,20,0.3); }
#sb-bubble.open  { transform: scale(.95); }
#sb-ico-chat  { display: block; }
#sb-ico-close { display: none; }
#sb-bubble.open #sb-ico-chat  { display: none;  }
#sb-bubble.open #sb-ico-close { display: block; }

#sb-badge {
  position: absolute; 
  top: -4px; 
  right: -4px;
  width: 20px; 
  height: 20px;
  background: #c4973a;
  border-radius: 50%; 
  font-size: .68rem; 
  font-weight: 800;
  color: #fff; 
  display: none; 
  align-items: center; 
  justify-content: center;
  border: 2px solid #fdfcf8; 
  box-shadow: 0 2px 8px rgba(196,151,58,.4);
}

/* FLOATING MAIN INTERACTIVE WINDOW MODULE */
#sb-window {
  position: fixed;
  bottom: 104px; 
  right: 26px;
  z-index: 9999;
  width: 385px; 
  height: 570px;
  background: #f8f4ec !important;
  border: 1px solid #e5d9c0;
  border-radius: var(--radius);
  display: flex; 
  flex-direction: column; 
  overflow: hidden;
  box-shadow: 0 30px 70px rgba(26,23,20,0.15), 0 0 0 1px rgba(26,23,20,0.02);
  transform: scale(.88) translateY(24px);
  opacity: 0; 
  pointer-events: none;
  transition: transform .3s cubic-bezier(.16,1,0.3,1), opacity .22s ease;
  transform-origin: bottom right;
  color: #1a1714 !important;
}
#sb-window.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

/* Mobile viewport layout optimizations overrides structures */
@media (max-width: 500px) {
  #sb-window {
    width: calc(100vw - 32px) !important;
    right: 16px !important;
    bottom: 96px !important;
    height: calc(100vh - 120px) !important;
  }
}

/* Header Context Box Node */
#sb-header {
  padding: 14px 16px;
  background: #1a1714 !important;
  border-b: 1px solid #2c2820;
  display: flex; 
  align-items: center; 
  gap: 11px; 
  flex-shrink: 0;
}
#sb-av {
  width: 40px; 
  height: 40px; 
  border-radius: 12px;
  background: #2c2820;
  display: flex; 
  align-items: center; 
  justify-content: center;
  font-size: 20px; 
  flex-shrink: 0; 
  position: relative;
  border: 1px solid #3d3830;
}
#sb-av::after {
  content: ''; 
  position: absolute; 
  bottom: -2px; 
  right: -2px;
  width: 11px; 
  height: 11px; 
  background: #16a34a;
  border-radius: 50%; 
  border: 2px solid #1a1714;
}
#sb-hinfo { flex: 1; }
#sb-hname  { font-size: .87rem; font-weight: 700; color: #f8f4ec; line-height: 1.2; }
#sb-hstatus { font-size: .68rem; color: #4ade80; font-weight: 600; letter-spacing: .02em; }
#sb-clear {
  background: rgba(255,255,255,.08); 
  border: 1px solid rgba(255,255,255,0.1);
  color: #9c9488; 
  border-radius: 8px; 
  padding: 5px 11px;
  font-size: .68rem; 
  font-weight: 600; 
  cursor: pointer; 
  transition: .18s;
}
#sb-clear:hover { background: rgba(255,255,255,.15); color: #f8f4ec; }

/* Messages Streaming Node Layers */
#sb-msgs {
  flex: 1; 
  overflow-y: auto; 
  padding: 14px 12px;
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
  scroll-behavior: smooth;
  background: #fdfcf8 !important;
}
#sb-msgs::-webkit-scrollbar { width: 3px; }
#sb-msgs::-webkit-scrollbar-thumb { background: #d4c4a0; border-radius: 2px; }

.sbm { display: flex; gap: 8px; align-items: flex-end; animation: sbmin .2s ease; }
@keyframes sbmin { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
.sbm.user { flex-direction: row-reverse; }

.sbm-ico {
  width: 30px; 
  height: 30px; 
  border-radius: 9px;
  display: flex; 
  align-items: center; 
  justify-content: center;
  font-size: 14px; 
  flex-shrink: 0;
}
.sbm.bot  .sbm-ico { background: #1a1714; border: 1px solid #3d3830; shadow: var(--shadow); }
.sbm.user .sbm-ico { background: #f0e9d8; border: 1px solid #e5d9c0; font-size: 12px; }

.sbm-txt {
  max-width: 76%; 
  padding: 9px 13px; 
  border-radius: 13px;
  font-size: .81rem; 
  line-height: 1.65; 
  color: #1a1714 !important;
}
.sbm.bot  .sbm-txt { background: #f8f4ec !important; border: 1px solid #e5d9c0; border-bottom-left-radius: 3px; }
.sbm.user .sbm-txt { background: #1a1714 !important; color: #fdfcf8 !important; border-bottom-right-radius: 3px; box-shadow: 0 4px 14px rgba(26,23,20,0.08); -webkit-text-fill-color: #fdfcf8 !important; }

/* Typing animation grids variables nodes */
#sb-typing { display: none; align-items: flex-end; gap: 8px; padding: 0 12px 4px; }
#sb-typing.show { display: flex; }
.sb-dots { background: #f8f4ec !important; border: 1px solid #e5d9c0; border-radius: 13px; border-bottom-left-radius: 3px; padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
.sb-dots span { width: 6px; height: 6px; background: #9c9488; border-radius: 50%; animation: sbb .85s ease infinite; }
.sb-dots span:nth-child(2) { animation-delay: .14s; }
.sb-dots span:nth-child(3) { animation-delay: .28s; }
@keyframes sbb { 0%,80%,100% { transform: translateY(0); opacity: .35; } 40% { transform: translateY(-5px); opacity: 1; } }

/* Quick Replies Array Links Components */
#sb-quick { padding: 6px 12px 4px; display: flex; flex-wrap: wrap; gap: 5px; border-top: 1px solid #e5d9c0; flex-shrink: 0; background: #fdfcf8 !important; overflow-x: auto; white-space: nowrap; }
#sb-quick::-webkit-scrollbar { height: 0px; }
.sb-q {
  padding: 5px 11px; 
  background: #f8f4ec; 
  border: 1px solid #e5d9c0;
  border-radius: 100px; 
  font-size: .71rem; 
  font-weight: 600; 
  color: #1a1714 !important;
  cursor: pointer; 
  transition: .15s;
}
.sb-q:hover { background: #1a1714; color: #fdfcf8 !important; transform: translateY(-1px); border-color: #1a1714; }

/* Active Fields Input Array Row Nodes */
#sb-input-row {
  padding: 10px 12px; 
  border-top: 1px solid #e5d9c0;
  display: flex; 
  gap: 8px; 
  align-items: flex-end;
  background: #fdfcf8 !important; 
  flex-shrink: 0;
}
#sb-inp {
  flex: 1; 
  background: #f8f4ec !important; 
  border: 1px solid #e5d9c0;
  border-radius: 11px; 
  padding: 9px 13px; 
  color: #1a1714 !important;
  font-size: .81rem; 
  resize: none;
  max-height: 96px; 
  min-height: 38px; 
  line-height: 1.5; 
  outline: none;
  transition: border-color .2s, background .2s;
}
#sb-inp::placeholder { color: #9c9488 !important; }
#sb-inp:focus { border-color: #1a1714; background: #fff !important; }
#sb-send {
  width: 38px; 
  height: 38px; 
  border-radius: 10px;
  background: #1a1714; 
  border: none;
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  flex-shrink: 0; 
  transition: .2s; 
  opacity: .35;
}
#sb-send:not(:disabled) { opacity: 1; }
#sb-send:not(:disabled):hover { transform: scale(1.05) translateY(-1px); background: #b8a07a; }
#sb-send:disabled { cursor: not-allowed; }

/* Dark mode architecture setups overrides targets values styles */
.dark #sb-window { background: #1a1714 !important; border-color: #3d3830 !important; color: #f8f4ec !important; box-shadow: 0 40px 100px rgba(0,0,0,.6); }
.dark #sb-header { background: #2c2820 !important; border-bottom-color: #3d3830 !important; }
.dark #sb-av { background: #1a1714; border-color: #3d3830; }
.dark #sb-av::after { border-color: #2c2820; }
.dark #sb-msgs { background: #2c2820 !important; }
.dark .sbm.bot .sbm-txt { background: #1a1714 !important; border-color: #3d3830 !important; color: #f8f4ec !important; }
.dark .sbm.user .sbm-txt { background: #c4973a !important; color: #1a1714 !important; -webkit-text-fill-color: #1a1714 !important; }
.dark .sbm.user .sbm-ico { background: #3d3830; border-color: #5c5548; }
.dark #sb-typing .sb-dots { background: #1a1714 !important; border-color: #3d3830 !important; }
.dark #sb-quick { background: #2c2820 !important; border-top-color: #3d3830 !important; }
.dark .sb-q { background: #1a1714; border-color: #3d3830; color: #d4c4a0 !important; }
.dark .sb-q:hover { background: #c4973a; color: #1a1714 !important; border-color: #c4973a; }
.dark #sb-input-row { background: #2c2820 !important; border-top-color: #3d3830 !important; }
.dark #sb-inp { background: #1a1714 !important; border-color: #3d3830 !important; color: #f8f4ec !important; }
.dark #sb-inp:focus { border-color: #c4973a; background: #2c2820 !important; }
.dark #sb-send { background: #c4973a; }
.dark #sb-send svg { fill: #1a1714; }
.dark #sb-bubble { border-color: #3d3830; background: #2c2820; }
</style>

<div id="sb-root">
  <button id="sb-bubble" onclick="sbToggle()" aria-label="Open SkillBridge AI">
    <span id="sb-badge"></span>
    <svg id="sb-ico-chat" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <svg id="sb-ico-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <div id="sb-window">
    <div id="sb-header">
      <div id="sb-av">🤖</div>
      <div id="sb-hinfo">
        <div id="sb-hname">SkillBridge AI</div>
        <div id="sb-hstatus">● Online — Your career guide</div>
      </div>
      <button id="sb-clear" onclick="sbClear()">Clear</button>
    </div>

    <div id="sb-msgs"></div>

    <div id="sb-typing">
      <div class="sbm-ico">🤖</div>
      <div class="sb-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="sb-quick">
      <button class="sb-q" onclick="sbQ(this)">What can you do?</button>
      <button class="sb-q" onclick="sbQ(this)">My skill gaps</button>
      <button class="sb-q" onclick="sbQ(this)">Career advice</button>
      <button class="sb-q" onclick="sbQ(this)">Next steps for me</button>
    </div>

    <div id="sb-input-row">
      <textarea id="sb-inp" placeholder="Ask me anything…" rows="1"
        onkeydown="sbKey(event)" oninput="sbResize(this)"></textarea>
      <button id="sb-send" onclick="sbSend()" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  let hist=[], open=false, busy=false, greeted=false;

  const SB_USER = {
    name:   "{{ current_user.name if current_user.is_authenticated else 'there' }}",
    skills: {{ (user.get('known_skills', []) if user is defined else [])|tojson }},
    goal:   "{{ user.get('career_goal','') if user is defined else '' }}",
  };
  const SB_PROJS = {{ (projects|map(attribute='title')|list|tojson) if projects is defined else '[]' }};

  const win   = document.getElementById('sb-window');
  const bub   = document.getElementById('sb-bubble');
  const msgs  = document.getElementById('sb-msgs');
  const inp   = document.getElementById('sb-inp');
  const snd   = document.getElementById('sb-send');
  const typ   = document.getElementById('sb-typing');
  const badge = document.getElementById('sb-badge');

  window.sbToggle = function(){
    open = !open;
    win.classList.toggle('open', open);
    bub.classList.toggle('open', open);
    badge.style.display = 'none';
    if(open && !greeted){ greeted=true; sbLoadHistory(); }
    if(open) setTimeout(()=>inp.focus(), 300);
  };

  async function sbLoadHistory(){
    try {
      const r = await fetch('/api/chatbot/history');
      const d = await r.json();
      if(d.messages && d.messages.length > 0){
        d.messages.forEach(m => {
          addMsg(m.role === 'user' ? 'user' : 'bot', m.content);
          hist.push({
            role:  m.role === 'user' ? 'user' : 'model',
            parts: [{text: m.content}]
          });
        });
        if(hist.length > 20) hist = hist.slice(-20);
      } else {
        sbGreet();
      }
    } catch(e) { sbGreet(); }
  }

  function sbGreet(){
    const fn = SB_USER.name.split(' ')[0];
    let g = `Hey **${fn}**! 👋 I'm your SkillBridge AI.\n\n`;
    if(SB_USER.skills.length && SB_PROJS.length)
      g += `I can see you have **${SB_USER.skills.length} skills** and **${SB_PROJS.length} project${SB_PROJS.length>1?'s':''}**. Ask me anything about your career, roadmaps, or SkillBridge features.\n\nWhat's on your mind?`;
    else
      g += `I'm here to help with career advice, skill gaps, roadmaps, and everything SkillBridge offers.\n\nWhat would you like to explore?`;
    addMsg('bot', g);
  }

  window.sbQ = function(el){ inp.value=el.textContent; sbSend(); };

  window.sbSend = async function(){
    const txt = inp.value.trim();
    if(!txt || busy) return;
    addMsg('user', txt);
    inp.value=''; sbResize(inp); snd.disabled=true; busy=true;
    msgs.appendChild(typ); typ.classList.add('show'); scroll();
    try {
      const r = await fetch('/api/chatbot',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message: txt})
      });
      const d = await r.json();
      typ.classList.remove('show');
      addMsg('bot', d.reply || "Sorry, couldn't get a response. Try again!");
    } catch(e){
      typ.classList.remove('show');
      addMsg('bot',"Connection error. Please try again.");
    }
    busy=false; snd.disabled=false; inp.focus();
  };

  window.sbClear = async function(){
    msgs.innerHTML='';
    try { await fetch('/api/chatbot/clear', {method:'POST'}); } catch(e){}
    sbGreet();
  };

  function addMsg(role, text){
    const w=document.createElement('div'); w.className=`sbm ${role}`;
    const i=document.createElement('div'); i.className='sbm-ico'; i.textContent=role==='bot'?'🤖':'👤';
    const b=document.createElement('div'); b.className='sbm-txt'; b.innerHTML=fmt(text);
    w.appendChild(i); w.appendChild(b);
    if(typ.parentNode===msgs) msgs.insertBefore(w,typ); else msgs.appendChild(w);
    scroll();
  }

  function fmt(t){
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code style="background:rgba(255,255,255,.1);padding:1px 5px;border-radius:4px;font-size:.77rem;">$1</code>')
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  }

  document.addEventListener('DOMContentLoaded', function() {
    const bubbleSvg = document.getElementById('sb-ico-chat');
    if (bubbleSvg) {
        bubbleSvg.setAttribute('stroke', '#fdfcf8');
    }
  });

  function scroll(){ setTimeout(()=>msgs.scrollTop=msgs.scrollHeight, 50); }

  window.sbResize = function(el){
    el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,96)+'px';
    snd.disabled=!el.value.trim();
  };

  window.sbKey = function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sbSend(); } };

  setTimeout(()=>{ if(!open){ badge.style.display='flex'; badge.textContent='1'; } }, 7000);
})();
</script>
