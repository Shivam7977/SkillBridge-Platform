<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#f8f4ec; --surface:#fff; --primary:#1a1714; --secondary:#c4973a;
  --text:#1a1714; --muted:#7a7268; --border:#e5d9c0; --input-bg:#f8f4ec;
  --radius:16px; --radius-sm:10px;
}
body.dark{
  --bg:#1a1714; --surface:#2c2820; --primary:#f0e9d8; --secondary:#c4973a;
  --text:#f0e9d8; --muted:#9c9488; --border:#3d3830; --input-bg:#23201c;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(1rem,5vw,2rem);transition:background .3s,color .3s;
}

/* Flash */
.flash-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.flash-banner{padding:.85rem 1.1rem;border-radius:var(--radius-sm);color:#fff;font-weight:600;font-size:.84rem;border-left:4px solid rgba(255,255,255,.3);}
.flash-success{background:#1a7a4a;}
.flash-error  {background:#dc3545;}
.flash-warning{background:#c4973a;color:#1a1714;}
.flash-info   {background:#1a1714;}

/* Back button */
.back-row{width:100%;max-width:420px;margin-bottom:.6rem;}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;
  padding:7px 13px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--surface);transition:.18s;
}
.back-btn:hover{background:var(--bg);color:var(--text);}

/* Card */
.card{
  width:100%;max-width:420px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:clamp(1.75rem,6vw,2.5rem);
  box-shadow:0 12px 40px rgba(0,0,0,.07);text-align:center;
}
.logo{
  font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;
  color:var(--text);text-decoration:none;display:block;margin-bottom:1.5rem;
}
.divider{width:100%;height:1px;background:var(--border);margin:1.25rem 0;}
.card h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,3vw,1.65rem);font-weight:900;
  color:var(--text);margin-bottom:.5rem;
}
.subtitle{color:var(--muted);font-size:.87rem;line-height:1.65;margin-bottom:1.5rem;}

/* Input */
.input-group{margin-bottom:1.1rem;text-align:left;position:relative;}
.input-group label{display:block;margin-bottom:.45rem;font-weight:700;font-size:.85rem;color:var(--text);}
.input-group input{
  width:100%;padding:13px 44px 13px 16px;
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  background:var(--input-bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.92rem;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.input-group input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,23,20,.08);}
.input-group input::placeholder{color:var(--muted);}
.toggle-pw{
  position:absolute;right:14px;top:13px;
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:.9rem;padding:4px;transition:.18s;
}
.toggle-pw:hover{color:var(--text);}

/* Strength bar */
.strength-bar{height:4px;border-radius:4px;background:var(--border);margin-top:6px;overflow:hidden;}
.strength-fill{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s;}
.strength-label{font-size:.75rem;color:var(--muted);margin-top:4px;text-align:left;}

/* Button */
.submit-btn{
  width:100%;padding:14px;
  background:var(--primary);color:var(--bg);
  border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;
  cursor:pointer;transition:.2s;margin-top:.5rem;
}
.submit-btn:hover{opacity:.88;transform:translateY(-1px);}

/* Back link */
.bottom-link{margin-top:1.25rem;color:var(--muted);font-size:.84rem;}
.bottom-link a{color:var(--secondary);font-weight:700;text-decoration:none;}
.bottom-link a:hover{text-decoration:underline;}

@media(max-width:480px){body{padding:.75rem;}}
@media(max-width:400px){
  .card{border-radius:12px;padding:1.25rem 1rem;}
  .logo{font-size:1.5rem;}
  .submit-btn{font-size:.88rem;padding:12px;}
}
@media(max-width:320px){
  .card h2{font-size:1.2rem;}
  .input-group input{padding:11px 40px 11px 12px;font-size:.85rem;}
}
</style>
</head>
<body>

<div class="flash-wrap">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash-banner flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>

<div class="back-row">
  <a href="{{ url_for('login') }}" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back to Login
  </a>
</div>

<div class="card">
  <a href="{{ url_for('index') }}" class="logo">SkillBridge</a>
  <div class="divider"></div>
  <form action="{{ url_for('reset_password', token=token) }}" method="POST">
    <h2>Create New Password</h2>
    <p class="subtitle">Choose a strong password for your account.</p>

    <div class="input-group">
      <label for="password">New Password</label>
      <div style="position:relative;">
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="input-group">
      <label for="confirm_password">Confirm Password</label>
      <div style="position:relative;">
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('confirm_password', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn">Update Password</button>
    <p class="bottom-link">Back to <a href="{{ url_for('login') }}">Login</a></p>
  </form>
</div>

<script>
(function(){ var t=localStorage.getItem('sb-theme')||'light'; t==='dark'?document.body.classList.add('dark'):document.body.classList.remove('dark'); })();

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function checkStrength(val) {
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    {w:'0%', c:'transparent', t:''},
    {w:'25%', c:'#dc3545', t:'Weak'},
    {w:'50%', c:'#fd7e14', t:'Fair'},
    {w:'75%', c:'#f0ad00', t:'Good'},
    {w:'100%', c:'#1a7a4a', t:'Strong'},
  ];
  const l = levels[score];
  fill.style.width = l.w;
  fill.style.background = l.c;
  label.textContent = l.t;
}
</script>
</body>
</html>
