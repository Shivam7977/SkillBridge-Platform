<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Project — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#f8f4ec; --surface:#fff; --primary:#1a1714; --secondary:#c4973a;
  --text:#1a1714; --muted:#7a7268; --border:#e5d9c0;
  --input-bg:#f8f4ec; --radius:14px; --radius-sm:10px;
}
body.dark {
  --bg:#1a1714; --surface:#2c2820; --primary:#f0e9d8; --secondary:#c4973a;
  --text:#f0e9d8; --muted:#9c9488; --border:#3d3830; --input-bg:#23201c;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px clamp(1rem,5vw,3rem);
  display:flex;align-items:center;gap:14px;
}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--muted);text-decoration:none;font-size:.87rem;font-weight:600;
  padding:8px 14px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--surface);transition:.18s;
}
.back-btn:hover{background:var(--bg);color:var(--text);}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--text);text-decoration:none;}

/* ── Page ── */
.page{display:flex;justify-content:center;padding:clamp(1.5rem,5vw,3rem) clamp(1rem,5vw,2rem);}

/* ── Card ── */
.card{
  width:100%;max-width:700px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:clamp(1.5rem,5vw,2.5rem);
  box-shadow:0 8px 30px rgba(0,0,0,.06);
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,3vw,2rem);font-weight:900;
  color:var(--text);margin-bottom:.3rem;
}
.card-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.75rem;}
.divider{width:100%;height:1px;background:var(--border);margin:1.5rem 0;}

/* ── Form ── */
.form-group{margin-bottom:1.4rem;}
.form-group label{display:block;margin-bottom:.5rem;font-weight:700;color:var(--text);font-size:.87rem;}
.form-group input[type="text"],
.form-group textarea{
  width:100%;padding:12px 16px;
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  background:var(--input-bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.92rem;
  transition:border-color .2s,box-shadow .2s;outline:none;resize:vertical;
}
.form-group textarea{min-height:110px;}
.form-group input:focus,.form-group textarea:focus{
  border-color:var(--text);box-shadow:0 0 0 3px rgba(26,23,20,.08);
}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted);}
.form-group small{display:block;margin-top:.4rem;font-size:.78rem;color:var(--muted);}

/* ── Radio group ── */
.radio-group{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.3rem;}
.radio-label{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--input-bg);
  cursor:pointer;font-size:.87rem;font-weight:600;transition:.18s;
}
.radio-label:hover{border-color:var(--text);}
.radio-label input[type="radio"]{accent-color:var(--text);}

/* ── Community section ── */
.community-section{
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:1.25rem;margin-top:1rem;
}
.community-section-title{
  font-size:.82rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;
}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* ── Submit ── */
.submit-btn{
  width:100%;padding:14px;
  background:var(--primary);color:var(--bg);
  border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;
  cursor:pointer;transition:.2s;margin-top:.5rem;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{opacity:.88;transform:translateY(-1px);}

@media(max-width:768px){
  .card{padding:1.75rem;}
  .two-col{grid-template-columns:1fr 1fr;}
  .topbar{padding:12px 1.25rem;}
}
@media(max-width:600px){
  .two-col{grid-template-columns:1fr;}
  .radio-group{flex-direction:column;gap:.6rem;}
  .radio-label{width:100%;justify-content:flex-start;}
  .card{padding:1.5rem;}
  .topbar{padding:11px 1rem;}
  .back-btn{padding:7px 11px;font-size:.82rem;}
}
@media(max-width:400px){
  .card{border-radius:10px;padding:1.25rem;}
  .card-title{font-size:1.3rem;}
  .submit-btn{font-size:.88rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="{{ url_for('my_projects') }}" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back
  </a>
  <a href="{{ url_for('main_page') }}" class="topbar-logo">SkillBridge</a>
</div>

<div class="page">
  <div class="card">
    <h1 class="card-title">Create Project</h1>
    <p class="card-sub">Fill in the details below to publish your project on SkillBridge.</p>
    <div class="divider"></div>

    <form method="POST">
      <div class="form-group">
        <label>Project Title <span style="color:#dc3545;">*</span></label>
        <input type="text" name="title" placeholder="e.g., AI Resume Builder" required>
      </div>

      <div class="form-group">
        <label>Description <span style="color:#dc3545;">*</span></label>
        <textarea name="description" placeholder="Describe what your project does, what problem it solves..." required></textarea>
      </div>

      <div class="form-group">
        <label>Skills Needed</label>
        <input type="text" name="skills" placeholder="Python, Flask, MongoDB...">
        <small>Separate skills with commas.</small>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label>Create a Community for this project?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="create_community" value="yes" required onclick="toggleCommunity(true)"> Yes, create one
          </label>
          <label class="radio-label">
            <input type="radio" name="create_community" value="no" onclick="toggleCommunity(false)"> No thanks
          </label>
        </div>
      </div>

      <div id="communitySection" class="community-section" style="display:none;">
        <div class="community-section-title">Community Details</div>

        <div class="form-group">
          <label>Visibility</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="community_visibility" value="public" checked> 🌐 Public
            </label>
            <label class="radio-label">
              <input type="radio" name="community_visibility" value="private"> 🔒 Private
            </label>
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Primary Skill <span style="color:#dc3545;">*</span></label>
            <input type="text" name="community_skill_primary" placeholder="e.g., Python">
          </div>
          <div class="form-group">
            <label>Secondary Skill</label>
            <input type="text" name="community_skill_secondary" placeholder="e.g., Flask">
          </div>
          <div class="form-group">
            <label>Tool / Framework</label>
            <input type="text" name="community_skill_tool" placeholder="e.g., Docker">
          </div>
          <div class="form-group">
            <label>Domain</label>
            <input type="text" name="community_skill_domain" placeholder="e.g., Web Dev">
          </div>
        </div>

        <div class="form-group">
          <label>Optional Skill</label>
          <input type="text" name="community_skill_optional" placeholder="e.g., Redis">
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fas fa-plus"></i> Create Project
      </button>
    </form>
  </div>
</div>

{% include 'notification_bell.html' %}
{% include 'chatbot_widget.html' %}
<script>
function toggleCommunity(show){
  document.getElementById("communitySection").style.display = show ? "block" : "none";
}
(function(){ var t=localStorage.getItem('sb-theme')||'light'; t==='dark'?document.body.classList.add('dark'):document.body.classList.remove('dark'); })();
</script>
</body>
</html>
